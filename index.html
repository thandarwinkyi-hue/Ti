<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>မြန်မာပညာဒေတာဘေ့စ် (Eye Care Reader)</title>
    <style>
        /* မူလအလင်းရောင် (Light Theme) */
        :root {
            --bg-color: #f7f9fa;
            --container-bg: #fff;
            --text-color: #333;
            --primary-color: #800000;
            --secondary-color: #d93838;
            --border-color: #ddd;
            --card-text: #555;
            --btn-bg: #fff;
            --btn-hover: #f5f5f5;
            --box-shadow: rgba(0,0,0,0.05);
            --alpha-bg: #fff8f8;
        }

        /* မျက်စိအေး ဝါနုရောင် (Sepia Theme) */
        body.theme-sepia {
            --bg-color: #f1e7d0;
            --container-bg: #fbf0d9;
            --text-color: #433422;
            --primary-color: #5b3e31;
            --secondary-color: #8c5b46;
            --border-color: #dfd1b8;
            --card-text: #5c4b37;
            --btn-bg: #fdf6e3;
            --btn-hover: #eee3c9;
            --box-shadow: rgba(91, 62, 49, 0.08);
            --alpha-bg: #fdf6e3;
        }

        /* မျက်စိအေး စိမ်းနုရောင် (Soft Green Theme) */
        body.theme-green {
            --bg-color: #dceee0;
            --container-bg: #eaf5ec;
            --text-color: #2d452b;
            --primary-color: #1b5e20;
            --secondary-color: #388e3c;
            --border-color: #c5e1c9;
            --card-text: #425e40;
            --btn-bg: #f1f8f2;
            --btn-hover: #d3ead7;
            --box-shadow: rgba(27, 94, 32, 0.06);
            --alpha-bg: #f1f8f2;
        }

        /* ညဘက်ဖတ်ရန် (Dark Theme) */
        body.theme-dark {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --primary-color: #ff9e9e;
            --secondary-color: #ff7575;
            --border-color: #444;
            --card-text: #cccccc;
            --btn-bg: #2c2c2c;
            --btn-hover: #3d3d3d;
            --box-shadow: rgba(0,0,0,0.3);
            --alpha-bg: #2c2c2c;
        }

        body {
            font-family: 'Pyidaungsu', 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 15px;
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }
        .container {
            max-width: 750px;
            margin: 0 auto;
            background: var(--container-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px var(--box-shadow);
            transition: background-color 0.3s;
        }
        h2 { text-align: center; color: var(--primary-color); margin-bottom: 15px; font-size: 24px; }
        
        .book-selector-container { text-align: center; margin-bottom: 15px; }
        #bookSelector {
            width: 100%; max-width: 400px; padding: 10px; font-size: 16px;
            border: 2px solid var(--primary-color); border-radius: 8px;
            background-color: var(--alpha-bg); color: var(--primary-color);
            font-weight: bold; outline: none; cursor: pointer;
        }

        /* Settings Bar (Font Size & Themes) */
        .settings-bar {
            display: flex; justify-content: center; align-items: center;
            gap: 15px; margin-bottom: 20px; padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color); flex-wrap: wrap;
        }
        .setting-btn {
            background-color: var(--btn-bg); color: var(--text-color);
            border: 1px solid var(--border-color); padding: 6px 15px;
            border-radius: 8px; cursor: pointer; font-weight: bold;
            font-size: 15px; transition: 0.2s;
        }
        .setting-btn:hover { background-color: var(--btn-hover); }

        /* Theme Picker Circles */
        .theme-picker { display: flex; gap: 10px; align-items: center; border-left: 2px solid var(--border-color); padding-left: 15px; }
        .theme-circle {
            width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
            border: 2px solid #bbb; transition: transform 0.2s, border-color 0.2s;
        }
        .theme-circle:hover { transform: scale(1.1); }
        .theme-circle.active { border: 2px solid var(--primary-color); transform: scale(1.1); }
        
        .bg-white { background-color: #f7f9fa; }
        .bg-sepia { background-color: #f1e7d0; }
        .bg-green { background-color: #dceee0; }
        .bg-dark { background-color: #1e1e1e; }

        .loading-box { text-align: center; padding: 40px; font-size: 16px; color: var(--primary-color); font-style: italic; line-height: 1.8; }
        .progress-text { font-weight: bold; color: #2e7d32; font-size: 18px; margin-top: 10px; display: inline-block; }
        body.theme-dark .progress-text { color: #66bb6a; }
        .retry-btn { background-color: var(--secondary-color); color: white; border: none; padding: 8px 15px; margin-top: 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        .main-app { display: none; }
        .search-container { margin-bottom: 15px; display: flex; gap: 8px; }
        #searchBox {
            flex: 1; padding: 12px 15px; font-size: 16px;
            border: 2px solid var(--border-color); border-radius: 8px; box-sizing: border-box;
            outline: none; background-color: var(--container-bg); color: var(--text-color);
        }
        #searchBox:focus { border-color: var(--primary-color); }
        
        .update-btn { background-color: #666; color: white; border: none; padding: 0 15px; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .update-btn:hover { background-color: var(--primary-color); }

        .alphabet-buttons {
            display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px;
            justify-content: center; background: var(--alpha-bg); padding: 10px;
            border-radius: 8px; border: 1px solid var(--border-color);
        }
        .abc-btn {
            background-color: var(--btn-bg); color: var(--text-color); border: 1px solid var(--border-color);
            padding: 6px 12px; font-size: 20px; border-radius: 4px; cursor: pointer; min-width: 38px; transition: all 0.2s;
        }
        .abc-btn:hover { background-color: var(--btn-hover); }
        .abc-btn.active { background-color: var(--primary-color); color: var(--container-bg); border-color: var(--primary-color); }
        
        .item-card {
            background: var(--container-bg); border-left: 5px solid var(--primary-color);
            padding: 15px; margin-bottom: 15px; border-radius: 4px;
            box-shadow: 0 2px 5px var(--box-shadow);
            border-top: 1px solid var(--border-color); border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color);
        }
        .item-title { font-weight: bold; font-size: 24px; color: var(--primary-color); margin-bottom: 8px; }
        .item-content { font-size: 15px; line-height: 1.8; color: var(--card-text); white-space: pre-line; transition: font-size 0.2s; }
        .no-result { text-align: center; color: #999; font-style: italic; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>ပိဋကလမ်းညွှန်</h2>

    <div class="settings-bar">
        <button class="setting-btn" onclick="changeFontSize(-1)">A-</button>
        <button class="setting-btn" onclick="changeFontSize(1)">A+</button>
        
        <div class="theme-picker">
            <div class="theme-circle bg-white" onclick="setTheme('light')" id="theme-light" title="ပုံမှန်အရောင်"></div>
            <div class="theme-circle bg-sepia" onclick="setTheme('sepia')" id="theme-sepia" title="မျက်စိအေး ဝါနုရောင်"></div>
            <div class="theme-circle bg-green" onclick="setTheme('green')" id="theme-green" title="မျက်စိအေး စိမ်းနုရောင်"></div>
            <div class="theme-circle bg-dark" onclick="setTheme('dark')" id="theme-dark" title="ညဘက်ဖတ်ရန်"></div>
        </div>
    </div>

    <div class="book-selector-container">
        <select id="bookSelector" onchange="changeBook()">
            <option value="vutthu">၁။ ပိဋကတ်ဝတ္ထုလမ်းညွှန် (၃ အုပ်)</option>
            <option value="pitaka">၂။ ပိဋကလမ်းညွှန် (၇ အုပ်)</option>
            <option value="thutethana">၃။ သုတေသနသရုပ်ပြအဘိဓာန် (၂ အုပ်)</option>
        </select>
    </div>

    <div id="loadingStatus" class="loading-box" style="display: none;">
        ဝီကီဆို့စ်မှ <span id="loadingBookName" style="font-weight:bold;"></span> ကို ဆွဲယူနေပါသည်...<br>
        <span id="progressIndicator" class="progress-text">စနစ်ကို စတင်ပြင်ဆင်နေသည်...</span><br>
        <span style="font-size: 13px; color: #777; display:block; margin-top:5px;">(ဒေတာပမာဏ ကြီးမားသဖြင့် ပထမဆုံးတစ်ကြိမ်သာ အချိန်အနည်းငယ် ကြာပါမည်)</span>
        <div id="retryArea"></div>
    </div>

    <div id="mainApp" class="main-app">
        <div class="search-container">
            <input type="text" id="searchBox" placeholder="ဒီနေရာမှာ စာရိုက်ပြီး ရှာဖွေပါ..." oninput="searchData()">
            <button class="update-btn" onclick="forceUpdateData()">စာအသစ်ပြန်ယူရန်</button>
        </div>

        <div class="alphabet-buttons" id="alphabetButtonsArea">
            <button class="abc-btn active" onclick="filterAlphabet('အားလုံး', this)">အားလုံး</button>
        </div>

        <div id="result-container"></div>
    </div>
</div>

<script>
    // ==========================================
    // UI Settings Logic (Font Size & Multiple Themes)
    // ==========================================
    let currentFontSize = localStorage.getItem("myanmar_reader_fontsize") ? parseInt(localStorage.getItem("myanmar_reader_fontsize")) : 15;
    let currentTheme = localStorage.getItem("myanmar_reader_theme") || "light";

    function applyUserSettings() {
        // Theme Apply
        document.body.className = ""; // Remove all classes
        if (currentTheme !== "light") {
            document.body.classList.add("theme-" + currentTheme);
        }

        // Active Circle Indicator
        document.querySelectorAll('.theme-circle').forEach(el => el.classList.remove('active'));
        const activeCircle = document.getElementById("theme-" + currentTheme);
        if(activeCircle) activeCircle.classList.add('active');

        // Font Size Apply
        const contentElements = document.querySelectorAll('.item-content');
        contentElements.forEach(el => { el.style.fontSize = currentFontSize + "px"; });
    }

    function setTheme(themeName) {
        currentTheme = themeName;
        localStorage.setItem("myanmar_reader_theme", currentTheme);
        applyUserSettings();
    }

    function changeFontSize(step) {
        currentFontSize += step;
        if (currentFontSize < 12) currentFontSize = 12; 
        if (currentFontSize > 28) currentFontSize = 28; 
        localStorage.setItem("myanmar_reader_fontsize", currentFontSize);
        applyUserSettings();
    }

    // ==========================================
    // Data Configuration
    // ==========================================
    const booksConfig = {
        "vutthu": {
            title: "ပိဋကတ်ဝတ္ထုလမ်းညွှန်",
            pages: ["ပိဋကတ်ဝတ္ထုလမ်းညွှန်", "ပိဋကတ်ဝတ္ထုလမ်းညွှန်-ဒု", "ပိဋကတ်ဝတ္ထုလမ်းညွှန်-တ"],
            vols: ["ပထမတွဲ (၁)", "ဒုတိယတွဲ (၂)", "တတိယတွဲ (၃)"]
        },
        "pitaka": {
            title: "ပိဋကလမ်းညွှန်",
            pages: [
                "ပိဋကလမ်းညွှန်-ကခဂဃင", "ပိဋကလမ်းညွှန်-စဆဇဈည", "ပိဋကလမ်းညွှန်-ဋဌဍဎဏတထဒဓန", 
                "ပိဋကလမ်းညွှန်-ပဖဗဘမ", "ပိဋကလမ်းညွှန်-ယရလဝ", "ပိဋကလမ်းညွှန်-သဟဠ", "ပိဋကလမ်းညွှန်-အ"
            ],
            vols: ["(က - င)", "(စ - ည)", "(ဋ - န)", "(ပ - မ)", "(ယ - ဝ)", "(သ - ဠ)", "(အ)"]
        },
        "thutethana": {
            title: "သုတေသနသရုပ်ပြအဘိဓာန်",
            pages: ["သုတေသနသရုပ်ပြအဘိဓာန်", "သုတေသနသရုပ်ပြအဘိဓာန်-ဒု"],
            vols: ["ပထမတွဲ", "ဒုတိယတွဲ"]
        }
    };

    let currentBookKey = "vutthu"; 
    let currentData = []; 
    let currentAlphabet = "အားလုံး";

    const myanmarAlphabets = [
        "က", "ခ", "ဂ", "ဃ", "င", "စ", "ဆ", "ဇ", "ဈ", "ည", 
        "ဋ", "ဌ", "ဍ", "ဎ", "ဏ", "တ", "ထ", "ဒ", "ဓ", "န", 
        "ပ", "ဖ", "ဗ", "ဘ", "မ", "ယ", "ရ", "လ", "ဝ", "သ", "ဟ", "ဠ", "အ"
    ];

    // ==========================================
    // IndexedDB Database
    // ==========================================
    const DB_NAME = "MyanmarLibraryDB";
    const STORE_NAME = "library_volumes";

    function initDB() {
        return new Promise((resolve, reject) => {
            let request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = function(e) {
                let db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
            };
            request.onsuccess = function(e) { resolve(e.target.result); };
            request.onerror = function(e) { reject(e.target.error); };
        });
    }

    async function saveToDB(key, data) {
        let db = await initDB();
        return new Promise((resolve, reject) => {
            let tx = db.transaction(STORE_NAME, "readwrite");
            let store = tx.objectStore(STORE_NAME);
            let request = store.put(data, key);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }

    async function getFromDB(key) {
        let db = await initDB();
        return new Promise((resolve, reject) => {
            let tx = db.transaction(STORE_NAME, "readonly");
            let store = tx.objectStore(STORE_NAME);
            let request = store.get(key);
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }

    async function deleteFromDB(key) {
        let db = await initDB();
        return new Promise((resolve, reject) => {
            let tx = db.transaction(STORE_NAME, "readwrite");
            let store = tx.objectStore(STORE_NAME);
            let request = store.delete(key);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }

    // ==========================================
    // Application Logic
    // ==========================================
    window.onload = function() {
        applyUserSettings(); 

        const btnArea = document.getElementById("alphabetButtonsArea");
        myanmarAlphabets.forEach(char => {
            const btn = document.createElement("button");
            btn.className = "abc-btn";
            btn.textContent = char;
            btn.onclick = function() { filterAlphabet(char, this); };
            btnArea.appendChild(btn);
        });
        
        loadSelectedBook();
    };

    function changeBook() {
        currentBookKey = document.getElementById("bookSelector").value;
        document.getElementById("searchBox").value = ""; 
        filterAlphabet('အားလုံး', document.querySelector('.abc-btn')); 
        loadSelectedBook();
    }

    async function loadSelectedBook() {
        currentData = [];
        let bookInfo = booksConfig[currentBookKey];
        let missingVolumeFound = false;

        document.getElementById("loadingBookName").textContent = bookInfo.title;

        for (let i = 0; i < bookInfo.pages.length; i++) {
            let savedVol = await getFromDB(`${currentBookKey}_vol_${i}`);
            if (savedVol) {
                currentData = currentData.concat(savedVol);
            } else {
                missingVolumeFound = true;
            }
        }

        if (!missingVolumeFound && currentData.length > 0) {
            startApp();
        } else {
            fetchMissingVolumes(bookInfo);
        }
    }

    async function fetchMissingVolumes(bookInfo) {
        document.getElementById("loadingStatus").style.display = "block";
        document.getElementById("mainApp").style.display = "none";
        document.getElementById("retryArea").innerHTML = ""; 
        
        const progressEl = document.getElementById("progressIndicator");

        for (let i = 0; i < bookInfo.pages.length; i++) {
            let isSaved = await getFromDB(`${currentBookKey}_vol_${i}`);
            if (isSaved) continue; 

            progressEl.textContent = `⏳ အတွဲ ${bookInfo.vols[i]} ကို ဒေါင်းလုဒ်ဆွဲနေပါသည်...`;
            
            try {
                const apiUrl = `https://my.wikisource.org/w/api.php?action=parse&page=${encodeURIComponent(bookInfo.pages[i])}&format=json&origin=*`;
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error("Network error");
                
                const data = await response.json();
                
                if (data && data.parse && data.parse.text) {
                    let extractedData = parseVolumeData(data.parse.text["*"], bookInfo.title);
                    if (extractedData.length > 0) {
                        await saveToDB(`${currentBookKey}_vol_${i}`, extractedData);
                    }
                }
            } catch (error) {
                console.error("Error at volume " + i, error);
                progressEl.innerHTML = `<span style='color:red;'>❌ ${bookInfo.vols[i]} ဆွဲယူရာတွင် အခက်အခဲရှိနေပါသည်။</span>`;
                document.getElementById("retryArea").innerHTML = `<button class="retry-btn" onclick="loadSelectedBook()">ထပ်မံကြိုးစားရန်</button>`;
                return; 
            }
        }
        loadSelectedBook(); 
    }

    function parseVolumeData(htmlContent, bookTitle) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlContent, 'text/html');
        const headings = doc.querySelectorAll('h2, h3, h4');
        let parsedList = [];

        headings.forEach(heading => {
            const title = heading.textContent.trim();
            if (!title || title.includes("ဆရာတော်") || title.includes("စာမျက်နှာ") || title.includes("ကဏ္ဍ") || title.includes(bookTitle)) return;

            let currentEl = heading;
            if (heading.parentElement && heading.parentElement.classList.contains('mw-heading')) {
                currentEl = heading.parentElement;
            }

            let content = "";
            let nextEl = currentEl.nextElementSibling;
            
            while (nextEl) {
                if (nextEl.matches('h1, h2, h3, h4, h5, h6') || nextEl.classList.contains('mw-heading') || nextEl.querySelector('h1, h2, h3, h4, h5, h6')) {
                    break;
                }
                content += nextEl.textContent.trim() + "\n";
                nextEl = nextEl.nextElementSibling;
            }

            let firstChar = title.replace(/[^က-အ]/g, '').charAt(0) || "အ"; 

            parsedList.push({
                "alphabet": firstChar,
                "title": title,
                "content": content.trim()
            });
        });
        return parsedList;
    }

    function startApp() {
        document.getElementById("loadingStatus").style.display = "none";
        document.getElementById("mainApp").style.display = "block";
        displayData(currentData);
    }

    function displayData(dataList) {
        const container = document.getElementById("result-container");
        container.innerHTML = ""; 

        if (dataList.length === 0) {
            container.innerHTML = "<div class='no-result'>ရှာဖွေမှုရလဒ် မရှိပါ။</div>";
            return;
        }

        dataList.forEach(item => {
            const card = document.createElement("div");
            card.className = "item-card";
            card.innerHTML = `<div class="item-title">${item.title}</div><div class="item-content">${item.content}</div>`;
            container.appendChild(card);
        });
        
        applyUserSettings(); 
    }

    function filterAlphabet(letter, buttonElement) {
        currentAlphabet = letter;
        document.querySelectorAll('.abc-btn').forEach(btn => btn.classList.remove('active'));
        buttonElement.classList.add('active');
        searchData();
    }

    function searchData() {
        const searchKeyword = document.getElementById("searchBox").value.trim();
        const filtered = currentData.filter(item => {
            let matchesAlphabet = (currentAlphabet === "အားလုံး" || item.alphabet === currentAlphabet);
            let matchesKeyword = false;

            if (searchKeyword === "") matchesKeyword = true;
            else if (searchKeyword.length === 1 && myanmarAlphabets.includes(searchKeyword)) {
                matchesKeyword = (item.alphabet === searchKeyword);
                matchesAlphabet = true; 
            } else {
                matchesKeyword = item.title.includes(searchKeyword) || item.content.includes(searchKeyword);
            }
            return matchesAlphabet && matchesKeyword;
        });
        displayData(filtered);
    }

    async function forceUpdateData() {
        let bookInfo = booksConfig[currentBookKey];
        if(confirm(`"${bookInfo.title}" ရဲ့ အချက်အလက်အသစ်များကို ပြန်ဒေါင်းလုဒ် ဆွဲမလား?`)) {
            for (let i = 0; i < bookInfo.pages.length; i++) {
                await deleteFromDB(`${currentBookKey}_vol_${i}`);
            }
            loadSelectedBook();
        }
    }
</script>

</body>
</html>
